version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jwt-backend
    ports:
      - "8000:8000"
    environment:
      # ⚠ Replace SECRET_KEY with a strong random value before deploying to production.
      # Example: openssl rand -hex 32
      - SECRET_KEY=dev-only-secret-key-CHANGE-before-deploying
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_SECONDS=300
    restart: unless-stopped
